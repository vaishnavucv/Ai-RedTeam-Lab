version: '3.9'

services:

  # ── Lab — Node.js web app ──────────────────────────────────────────────────
  # network_mode: host gives the container direct access to the host network.
  # This means the container reaches Ollama at localhost:11434 with no bridging.
  # The app binds directly on the host at PORT=8081 — no ports mapping needed.
  # Dashboard: http://localhost:8081
  lab:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm01-lab
    network_mode: host
    environment:
      - PORT=8081
      - OLLAMA_HOST=http://localhost:11434
      - TASK_STATUS_DIR=/host-tmp
    volumes:
      - ./logs:/app/logs
      - /tmp:/host-tmp
    restart: unless-stopped

