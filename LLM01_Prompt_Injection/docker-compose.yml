version: '3.9'

services:

  # ── Lab — Node.js web app ──────────────────────────────────────────────────
  # Ollama + TinyLlama run on the host Ubuntu system (not in a container).
  # The lab container reaches the host Ollama via host.docker.internal,
  # which is mapped to the host gateway IP using extra_hosts below.
  lab:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm01-lab
    ports:
      - "8081:3001"                   # dashboard → http://localhost:8081
    environment:
      - PORT=3001
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux: resolves to host IP (Docker 20.10+)
    volumes:
      - ./logs:/app/logs              # interaction logs persisted to host
    restart: unless-stopped
